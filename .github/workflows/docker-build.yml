name: Build and Push Docker Images

on:
  push:
    branches:
      - main

env:
  DOCKER_REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/inventory-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USER }}/inventory-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USER }}/inventory-backend:buildcache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/inventory-frontend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USER }}/inventory-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USER }}/inventory-frontend:buildcache,mode=max

  iac-verification:
    name: Docker IaC verification
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker Compose configuration
        run: docker compose -f docker-compose.yml config

      - name: Build Docker services for verification
        run: docker compose -f docker-compose.yml build

  iac-security-scan:
    name: KICS IaC security scan
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run KICS IaC scan
        continue-on-error: true
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" -w /src ghcr.io/checkmarx/kics:latest scan -p /src --report-formats json -o /src --output-name kics-report --ignore-on-exit all

      - name: Upload KICS report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kics-report
          path: kics-report.json

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        run: |
          docker run --rm -v "${{ github.workspace }}:/project" -w /project anchore/syft:v0.93.0 packages . -o cyclonedx-json=sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
