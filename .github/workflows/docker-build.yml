name: Build and Push Docker Images

on:
  push:
    branches:
      - main

env:
  DOCKER_REGISTRY: docker.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/inventory-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USER }}/inventory-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USER }}/inventory-backend:buildcache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/inventory-frontend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USER }}/inventory-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USER }}/inventory-frontend:buildcache,mode=max
