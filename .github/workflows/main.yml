name: Security Scan and SBOM Workflow

on:
  workflow_dispatch:

jobs:
  iac-verification:
    name: Docker IaC verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker Compose configuration
        run: docker compose -f docker-compose.yml config

      - name: Build Docker services for verification
        run: docker compose -f docker-compose.yml build

  iac-security-scan:
    name: KICS IaC security scan
    runs-on: ubuntu-latest
    needs: iac-verification

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run KICS IaC scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" -w /src checkmarx/kics:latest scan -p /src --report-formats json -o /src --output-name kics-report

      - name: Upload KICS report
        uses: actions/upload-artifact@v4
        with:
          name: kics-report
          path: kics-report.json

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: iac-security-scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        run: |
          docker run --rm -v "${{ github.workspace }}:/project" -w /project anchore/syft:v0.93.0 syft . -o cyclonedx-json=sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
